<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - Tikpan AI Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =============================================
   ADMIN PANEL - Professional Redesign
   ============================================= */
:root {
  --bg: #f4f6fb;
  --bg2: #ffffff;
  --bg3: #eef0f7;
  --text: #111827;
  --text2: #6b7280;
  --text3: #9ca3af;
  --border: #e5e7eb;
  --border2: #d1d5db;
  --card: #ffffff;
  --card-border: rgba(99,102,241,0.07);
  --accent: #6366f1;
  --accent2: #4f46e5;
  --accent-light: rgba(99,102,241,0.07);
  --accent-mid: rgba(99,102,241,0.12);
  --accent-glow: rgba(99,102,241,0.18);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.08);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.08);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --font: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --nav-bg: rgba(244,246,251,0.88);
}

[data-theme="dark"] {
  --bg: #080810;
  --bg2: #0d0d1a;
  --bg3: #14141f;
  --text: #e8ecf4;
  --text2: #8b92a5;
  --text3: #555b73;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --card: #111120;
  --card-hover: #171728;
  --card-border: rgba(255,255,255,0.05);
  --accent-light: rgba(99,102,241,0.10);
  --accent-mid: rgba(99,102,241,0.18);
  --accent-glow: rgba(99,102,241,0.28);
  --nav-bg: rgba(8,8,16,0.90);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

/* Top Nav */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:56px;
  background:var(--nav-bg);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 24px;gap:8px;
}

.header h1{
  font-size:16px;font-weight:700;letter-spacing:-0.3px;
  background:linear-gradient(135deg,#818cf8,#6366f1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  flex-shrink:0;
}

.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}

.header a{
  padding:5px 12px;border-radius:var(--radius-sm);
  font-size:12px;color:var(--text2);text-decoration:none;
  border:1px solid var(--border);
  transition:all .15s;
}

.header a:hover{color:var(--text);border-color:var(--accent);background:var(--accent-light)}

/* Layout */
.layout{
  position:fixed;top:56px;left:0;right:0;bottom:0;
  display:flex;overflow:hidden;
}

/* Sidebar */
.sidebar{
  width:210px;flex-shrink:0;
  background:var(--card);
  border-right:1px solid var(--border);
  padding:12px 0;overflow-y:auto;
}

.side-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 16px;
  font-size:13px;font-weight:500;
  color:var(--text2);
  cursor:pointer;border:none;background:none;
  border-left:3px solid transparent;
  width:100%;text-align:left;
  transition:all .15s;
}

.side-item:hover{
  background:var(--accent-light);
  color:var(--text);
}

.side-item.active{
  background:var(--accent-light);
  color:var(--accent);
  border-left-color:var(--accent);
  font-weight:600;
}

.side-item .icon{font-size:14px}

/* Main */
.main{
  flex:1;overflow-y:auto;
  padding:20px 24px;
}

/* Page title */
.page-title{
  font-size:22px;font-weight:700;
  letter-spacing:-0.3px;
  margin-bottom:6px;
}

.page-desc{font-size:13px;color:var(--text2);margin-bottom:20px}

/* Cards */
.card{
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  padding:20px 22px;
  margin-bottom:16px;
  box-shadow:var(--shadow-card);
  transition:border-color .2s;
}

.card:hover{border-color:rgba(99,102,241,0.12)}

.card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
  padding-bottom:12px;
  border-bottom:1px solid var(--border);
}

.card-title{
  font-size:12px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.6px;
  display:flex;align-items:center;gap:6px;
}

.card-title .icon{font-size:14px}

/* Notice */
.notice{
  background:var(--accent-light);
  border:1px solid rgba(99,102,241,0.12);
  border-radius:var(--radius-sm);
  padding:10px 14px;
  font-size:12px;color:var(--accent);
  margin-bottom:16px;
  line-height:1.5;
}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}

th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{
  color:var(--text3);font-weight:600;font-size:10.5px;
  text-transform:uppercase;letter-spacing:.5px;
  background:var(--bg3);
}

tr:hover td{background:var(--bg3)}

td code{
  font-family:monospace;font-size:11px;
  color:var(--accent);background:var(--accent-light);
  padding:1px 6px;border-radius:4px;
}

/* Tags */
.tag{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;
}

.tag-blue{background:var(--accent-light);color:var(--accent)}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-red{background:var(--red-bg);color:var(--red)}
.tag-amber{background:var(--amber-bg);color:var(--amber)}
.tag-gray{background:var(--bg3);color:var(--text3)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 12px;border:none;border-radius:var(--radius-sm);
  font-size:12px;font-weight:500;cursor:pointer;
  transition:all .15s;font-family:var(--font);
  border:1px solid transparent;
}

.btn-primary{
  background:linear-gradient(135deg,#818cf8,#6366f1);
  color:#fff;box-shadow:0 2px 10px rgba(99,102,241,0.2);
}

.btn-primary:hover{opacity:.88;transform:translateY(-1px)}

.btn-edit{
  background:var(--bg3);color:var(--text2);
  border-color:var(--border);
}

.btn-edit:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-danger:hover{opacity:.85}

.btn-sm{padding:4px 10px;font-size:11px}

/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}

label{
  display:block;font-size:12px;font-weight:600;
  margin-bottom:5px;color:var(--text);
}

input,select,textarea{
  width:100%;padding:8px 12px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:13px;color:var(--text);
  background:var(--bg2);
  transition:all .2s;
  font-family:var(--font);
}

input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}

input[readonly]{opacity:.5;cursor:not-allowed}

textarea{min-height:80px;resize:vertical}

.actions{
  display:flex;gap:8px;justify-content:flex-end;
  margin-top:16px;padding-top:16px;
  border-top:1px solid var(--border);
}

/* Config Builder */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;margin-bottom:12px;flex-wrap:wrap;
}

.toolbar-left,.toolbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.field-list{display:flex;flex-direction:column;gap:8px}
.sort-list{display:flex;flex-direction:column;gap:8px}

.sort-row{
  display:grid;
  grid-template-columns:34px minmax(170px,1fr) minmax(120px,.75fr) minmax(100px,.6fr) 220px;
  gap:10px;align-items:center;
  padding:10px 12px;border:1px solid var(--border);
  border-radius:var(--radius-sm);background:var(--bg2);
  transition:border-color .15s,background .15s;
}
.sort-row:hover{border-color:var(--accent);background:var(--accent-light)}
.sort-row.dragging{opacity:.55;border-style:dashed}

.field-row{
  display:grid;
  grid-template-columns:34px minmax(150px,1fr) 110px minmax(160px,1.1fr) 84px 210px;
  gap:10px;align-items:center;
  padding:10px 12px;border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--bg2);
  transition:border-color .15s,background .15s,box-shadow .15s;
}

.field-row:hover{border-color:var(--accent);background:var(--accent-light)}
.field-row.dragging{opacity:.55;border-style:dashed}
.drag-handle{
  width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text3);cursor:grab;background:var(--bg3);
}
.drag-handle:active{cursor:grabbing}

.field-meta{min-width:0}
.field-meta strong{display:block;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.field-meta code{display:inline-block;margin-top:3px}
.field-actions{display:flex;justify-content:flex-end;gap:6px;flex-wrap:wrap}
.muted{color:var(--text3);font-size:12px}

.config-layout{
  display:grid;
  grid-template-columns:minmax(0,1.45fr) minmax(280px,.75fr);
  gap:16px;align-items:start;
}

.preset-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px}
.preset-btn{
  padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg2);color:var(--text);font-size:12px;font-weight:600;
  cursor:pointer;text-align:left;transition:all .15s;
}
.preset-btn span{display:block;font-size:11px;color:var(--text3);font-weight:500;margin-top:2px}
.preset-btn:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

.option-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.option-row{display:grid;grid-template-columns:28px 1fr 70px;gap:8px;align-items:center}
.option-row.dragging{opacity:.55}
.option-row input{height:34px}

.preview-panel{
  position:sticky;top:16px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg2);padding:16px;
}
.preview-title{font-size:12px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}
.preview-control{border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:12px;background:var(--bg)}
.preview-control label{font-size:13px}
.preview-upload{
  min-height:88px;border:1px dashed var(--border2);border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;background:var(--bg3);
}
.preview-log{font-size:12px;color:var(--text3);line-height:1.7;margin-top:12px}

@media (max-width: 1100px){
  .config-layout{grid-template-columns:1fr}
  .preview-panel{position:static}
  .field-row{grid-template-columns:34px minmax(140px,1fr) 100px minmax(120px,1fr)}
  .field-row .field-actions{grid-column:1 / -1;justify-content:flex-start}
  .sort-row{grid-template-columns:34px minmax(140px,1fr) minmax(100px,1fr)}
  .sort-row .field-actions{grid-column:1 / -1;justify-content:flex-start}
}

/* Badge */
.badge{
  display:inline-block;padding:1px 6px;
  border-radius:4px;font-size:10px;
  background:var(--bg3);color:var(--text3);
  margin-left:4px;
}

/* Empty */
.empty{
  text-align:center;padding:40px;
  color:var(--text3);font-size:13px;
}

.empty-icon{font-size:32px;opacity:.3;margin-bottom:8px}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>⚙️ 管理后台</h1>
  <div class="header-right">
    <a href="/" target="_blank">🏠 前台</a>
    <a href="#" onclick="logout()">🚪 退出</a>
  </div>
</div>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <button class="side-item active" onclick="showTab('categories', this)">
      <span class="icon">📂</span> 分类管理
    </button>
    <button class="side-item" onclick="showTab('models', this)">
      <span class="icon">🧬</span> 模型管理
    </button>
    <button class="side-item" onclick="showTab('fields', this)">
      <span class="icon">📋</span> 字段管理
    </button>
    <button class="side-item" onclick="showTab('channels', this)">
      <span class="icon">🔌</span> 供应商渠道
    </button>
    <button class="side-item" onclick="showTab('pricing', this)">
      <span class="icon">💰</span> 计价规则
    </button>
    <button class="side-item" onclick="showTab('ledger', this)">
      <span class="icon">📒</span> 余额流水
    </button>
    <button class="side-item" onclick="showTab('settings', this)">
      <span class="icon">⚙️</span> 系统设置
    </button>
    <button class="side-item" onclick="showTab('about', this)">
      <span class="icon">ℹ️</span> 关于
    </button>
  </div>

  <!-- Main -->
  <div class="main" id="main-content"></div>
</div>

<script>
let categories = [];
let models = [];
let channels = [];
let pricingRules = [];
let routes = [];
let ledgerEntries = [];
let selectedModelId = null;
let fieldOptions = [];
let draggedFieldId = null;
let draggedOptionIndex = null;

async function api(url, method='GET', body=null) {
  const opts = {method, headers:{}};
  if (body) { opts.headers['Content-Type']='application/json'; opts.body=JSON.stringify(body); }
  const resp = await fetch(url, opts);
  if (!resp.ok) throw await resp.json();
  return resp.json();
}

function esc(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function jsArg(value) {
  return esc(JSON.stringify(String(value ?? '')));
}

function parseJsonSafe(value, fallback) {
  if (!value) return fallback;
  try { return JSON.parse(value); } catch { return fallback; }
}

function asNumber(value, fallback=0) {
  const n = Number(value);
  return Number.isFinite(n) ? n : fallback;
}

async function logout() {
  await fetch('/admin/logout');
  location.href='/admin';
}

function showTab(tab, btn) {
  document.querySelectorAll('.side-item').forEach(a=>a.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (tab==='categories') renderCategories();
  else if (tab==='models') renderModels();
  else if (tab==='fields') renderFields();
  else if (tab==='channels') renderChannels();
  else if (tab==='pricing') renderPricing();
  else if (tab==='ledger') renderLedger();
  else if (tab==='settings') renderSettings();
  else if (tab==='about') renderAbout();
}

// ===== Categories =====
async function renderCategories() {
  categories = await api('/admin/api/categories');
  const h = [
    `<div class="page-title">📂 分类管理</div>`,
    `<div class="page-desc">分类是模型的容器，例如"图像生成"、"音乐生成"</div>`,
    `<div class="notice">💡 新增一个分类后，就可以在其中添加具体模型。每个分类对应侧边栏的一个分组。</div>`,
    `<div class="card">
      <div class="card-header">
        <div class="card-title"><span class="icon">📂</span> 全部分类 (${categories.length})</div>
        <div class="toolbar-right">
          <button class="btn btn-edit btn-sm" onclick="saveSortOrder('category')">保存排序</button>
          <button class="btn btn-primary btn-sm" onclick="showAddCat()">+ 新增分类</button>
        </div>
      </div>`,
  ];
  if (categories.length===0) h.push('<div class="empty"><div class="empty-icon">📂</div>暂无分类</div>');
  else {
    h.push('<div class="sort-list" id="category-sort-list">');
    for (const c of categories) {
      h.push(`<div class="sort-row" draggable="true" data-id="${c.id}" data-kind="category" ondragstart="sortDragStart(event)" ondragover="sortDragOver(event)" ondrop="sortDrop(event)" ondragend="sortDragEnd(event)">
        <span class="drag-handle" title="拖拽排序">↕</span>
        <div class="field-meta"><strong>${esc(c.name)}</strong><code>${esc(c.key)}</code></div>
        <div class="muted">图标：${esc(c.icon || '📦')}</div>
        <div class="muted">排序：${c.sort_order||'—'}</div>
        <div class="field-actions">
          <button class="btn btn-sm btn-edit" onclick="moveSortRow('category', ${c.id}, -1)">上移</button>
          <button class="btn btn-sm btn-edit" onclick="moveSortRow('category', ${c.id}, 1)">下移</button>
          <button class="btn btn-sm btn-edit" onclick="editCat(${c.id})">编辑</button>
          <button class="btn btn-sm btn-danger" onclick="delCat(${c.id})">删除</button>
        </div>
      </div>`);
    }
    h.push('</div><div class="muted" id="category-order-status" style="margin-top:10px">拖动分类可调整前台侧边栏顺序。</div>');
  }
  h.push('</div>');
  document.getElementById('main-content').innerHTML = h.join('');
}

function showAddCat() { showCatForm(null); }
function editCat(id) { showCatForm(categories.find(c=>c.id===id)); }

function sortDragStart(e) {
  e.currentTarget.classList.add('dragging');
}

function sortDragOver(e) {
  e.preventDefault();
  const list = e.currentTarget.parentElement;
  const dragging = list?.querySelector('.sort-row.dragging');
  if (!list || !dragging) return;
  const afterElement = getSortAfterElement(list, e.clientY);
  if (afterElement == null) list.appendChild(dragging);
  else list.insertBefore(dragging, afterElement);
}

function sortDrop(e) {
  e.preventDefault();
  const kind = e.currentTarget.dataset.kind;
  saveSortOrder(kind, false);
}

function sortDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
}

function getSortAfterElement(container, y) {
  const rows = [...container.querySelectorAll('.sort-row:not(.dragging)')];
  return rows.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

async function moveSortRow(kind, id, direction) {
  const list = document.getElementById(`${kind}-sort-list`);
  const row = list?.querySelector(`.sort-row[data-id="${CSS.escape(String(id))}"]`);
  if (!row) return;
  if (direction < 0 && row.previousElementSibling) row.parentNode.insertBefore(row, row.previousElementSibling);
  if (direction > 0 && row.nextElementSibling) row.parentNode.insertBefore(row.nextElementSibling, row);
  await saveSortOrder(kind, false);
}

async function saveSortOrder(kind, showToast=true) {
  const list = document.getElementById(`${kind}-sort-list`);
  if (!list) return;
  const ids = Array.from(list.querySelectorAll('.sort-row')).map(row => row.dataset.id);
  const endpoint = kind === 'category' ? '/admin/api/categories/reorder' : '/admin/api/models/reorder';
  const status = document.getElementById(`${kind}-order-status`);
  if (status) status.textContent = '正在保存排序...';
  await api(endpoint, 'POST', { ids });
  if (status) status.textContent = `排序已保存 · ${new Date().toLocaleTimeString()}`;
  if (showToast) alert('排序已保存');
}

function showCatForm(cat) {
  const isEdit = !!cat;
  document.getElementById('main-content').innerHTML = `
    <div class="page-title">${isEdit?'✏️ 编辑':'➕ 新增'}分类</div>
    <div class="card">
      <div class="form-row">
        <div><label>标识 Key</label><input id="cat-key" value="${cat?.key||''}" ${isEdit?'readonly':''} placeholder="如：image_generation"></div>
        <div><label>名称</label><input id="cat-name" value="${cat?.name||''}" placeholder="如：🖼️ 图像生成"></div>
      </div>
      <div class="form-row">
        <div><label>图标</label><input id="cat-icon" value="${cat?.icon||'📦'}" placeholder="如：🖼️"></div>
        <div><label>排序</label><input id="cat-sort" type="number" value="${cat?.sort_order||0}"></div>
      </div>
      <div class="actions">
        <button class="btn btn-edit" onclick="renderCategories()">取消</button>
        <button class="btn btn-primary" onclick="saveCat('${isEdit?cat.id:''}')">💾 保存</button>
      </div>
    </div>`;
}

async function saveCat(id) {
  const data = {

function normalizeOptions(raw) {
  const arr = Array.isArray(raw) ? raw : [];
  return arr.map(item => {
    if (typeof item === 'string') return item;
    if (item && typeof item === 'object') return item.label || item.value || '';
    return String(item ?? '');
  }).filter(Boolean);
}

function toggleFieldOpts() {

  document.getElementById('f-file-opts').style.display = t==='file_image'?'':'none';
  updateFieldPreview();
}

function bindFieldFormPreview() {
  document.querySelectorAll('#main-content input, #main-content select, #main-content textarea').forEach(el => {
    el.addEventListener('input', updateFieldPreview);
    el.addEventListener('change', updateFieldPreview);
  });
}

function applyFieldPreset(key) {
  const preset = FIELD_PRESETS[key];
  if (!preset) return;
  const set = (id, value) => { const el = document.getElementById(id); if (el && !el.readOnly) el.value = value ?? ''; };
  set('f-key', preset.field_key);
  set('f-label', preset.label);
  set('f-placeholder', preset.placeholder);
  set('f-default', preset.default_value);
  set('f-rows', preset.rows || 4);
  document.getElementById('f-type').value = preset.field_type;
  document.getElementById('f-required').value = String(preset.required || 0);
  fieldOptions = [...(preset.options || [])];
  const maxEl = document.getElementById('f-maxcount');
  if (maxEl) maxEl.value = preset.max_count || 1;
  renderOptionEditor();
  toggleFieldOpts();
}

function renderOptionEditor() {
  const list = document.getElementById('option-list');
  if (!list) return;
  if (!fieldOptions.length) {
    list.innerHTML = '<div class="empty" style="padding:18px">暂无选项，点击“添加选项”开始配置</div>';
    updateFieldPreview();
    return;
  }
  list.innerHTML = fieldOptions.map((value, index) => `
    <div class="option-row" draggable="true" data-index="${index}" ondragstart="optionDragStart(event)" ondragover="optionDragOver(event)" ondrop="optionDrop(event)" ondragend="optionDragEnd(event)">
      <span class="drag-handle" title="拖拽排序">↕</span>
      <input class="option-input" value="${esc(value)}" placeholder="选项值" oninput="syncOption(${index}, this.value)">
      <div class="field-actions">
        <button class="btn btn-sm btn-edit" type="button" onclick="moveOption(${index}, -1)">↑</button>
        <button class="btn btn-sm btn-danger" type="button" onclick="removeOption(${index})">删</button>
      </div>
    </div>
  `).join('');
  updateFieldPreview();
}

function addOption(value='') {
  fieldOptions.push(value || `选项${fieldOptions.length + 1}`);
  renderOptionEditor();
}

function syncOption(index, value) {
  fieldOptions[index] = value;
  updateFieldPreview();
}

function removeOption(index) {
  fieldOptions.splice(index, 1);
  renderOptionEditor();
}

function moveOption(index, direction) {
  const target = index + direction;
  if (target < 0 || target >= fieldOptions.length) return;
  [fieldOptions[index], fieldOptions[target]] = [fieldOptions[target], fieldOptions[index]];
  renderOptionEditor();
}

function optionDragStart(e) {
  draggedOptionIndex = Number(e.currentTarget.dataset.index);
  e.currentTarget.classList.add('dragging');
}

function optionDragOver(e) {
  e.preventDefault();
}

function optionDrop(e) {
  e.preventDefault();
  const target = Number(e.currentTarget.dataset.index);
  if (!Number.isInteger(draggedOptionIndex) || draggedOptionIndex === target) return;
  const [item] = fieldOptions.splice(draggedOptionIndex, 1);
  fieldOptions.splice(target, 0, item);
  draggedOptionIndex = null;
  renderOptionEditor();
}

function optionDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  draggedOptionIndex = null;
}

function collectFieldOptions() {
  const inputs = document.querySelectorAll('#option-list .option-input');
  return Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
}

function updateFieldPreview() {
  const box = document.getElementById('field-preview');
  const meta = document.getElementById('field-preview-meta');
  if (!box || !meta) return;
  const type = document.getElementById('f-type')?.value || 'text';
  const label = document.getElementById('f-label')?.value || '字段标签';
  const placeholder = document.getElementById('f-placeholder')?.value || '';
  const defaultValue = document.getElementById('f-default')?.value || '';
  const required = document.getElementById('f-required')?.value === '1';
  const rows = asNumber(document.getElementById('f-rows')?.value, 4);
  const options = collectFieldOptions();
  let control = '';
  if (type === 'textarea') {
    control = `<textarea rows="${rows}" placeholder="${esc(placeholder)}">${esc(defaultValue)}</textarea>`;
  } else if (type === 'select' || type === 'select_group') {
    const opts = (options.length ? options : ['选项 A', '选项 B']).map(o => `<option>${esc(o)}</option>`).join('');
    control = `<select>${opts}</select>${type === 'select_group' ? '<div class="muted" style="margin-top:8px">选择后可展开附加参数</div>' : ''}`;
  } else if (type === 'number') {
    control = `<input type="number" placeholder="${esc(placeholder)}" value="${esc(defaultValue)}">`;
  } else if (type === 'checkbox') {
    control = `<label class="checkbox-label"><input type="checkbox" ${defaultValue ? 'checked' : ''}> ${esc(label)}</label>`;
    box.innerHTML = `<div class="preview-control">${control}</div>`;
    meta.textContent = `类型：${type} · Key：${document.getElementById('f-key')?.value || '未填写'}`;
    return;
  } else if (type === 'file_image') {
    const maxCount = asNumber(document.getElementById('f-maxcount')?.value, 1);
    control = `<div class="preview-upload">点击上传图片 · 最多 ${maxCount} 张</div>`;
  } else {
    control = `<input type="text" placeholder="${esc(placeholder)}" value="${esc(defaultValue)}">`;
  }
  box.innerHTML = `<div class="preview-control"><label>${esc(label)}${required ? '<span style="color:var(--red)"> *</span>' : ''}</label>${control}</div>`;
  meta.textContent = `类型：${type} · Key：${document.getElementById('f-key')?.value || '未填写'} · 选项数：${options.length}`;
}

function fieldDragStart(e) {
  draggedFieldId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
}

function getDragAfterElement(container, y) {
  const rows = [...container.querySelectorAll('.field-row:not(.dragging)')];
  return rows.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function fieldDragOver(e) {
  e.preventDefault();
  const list = document.getElementById('field-list');
  const dragging = list?.querySelector('.field-row.dragging');
  if (!list || !dragging) return;
  const afterElement = getDragAfterElement(list, e.clientY);
  if (afterElement == null) list.appendChild(dragging);
  else list.insertBefore(dragging, afterElement);
}

function fieldDrop(e) {
  e.preventDefault();
  saveFieldOrder(false);
}

function fieldDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  draggedFieldId = null;
}

async function moveField(id, direction) {
  const row = document.querySelector(`.field-row[data-id="${id}"]`);
  if (!row) return;
  if (direction < 0 && row.previousElementSibling) row.parentNode.insertBefore(row, row.previousElementSibling);
  if (direction > 0 && row.nextElementSibling) row.parentNode.insertBefore(row.nextElementSibling, row);
  await saveFieldOrder(false);
}

async function saveFieldOrder(showToast=true) {
  const rows = document.querySelectorAll('#field-list .field-row');
  const ids = Array.from(rows).map(row => row.dataset.id);
  if (!ids.length || !selectedModelId) return;
  const status = document.getElementById('field-order-status');
  if (status) status.textContent = '正在保存排序...';
  await api(`/admin/api/models/${selectedModelId}/fields/reorder`, 'POST', { ids });
  if (status) status.textContent = `排序已保存 · ${new Date().toLocaleTimeString()}`;
  if (showToast) alert('字段排序已保存');
}

async function saveField(id) {
  const fieldType = document.getElementById('f-type').value;
  const data = {
    field_key: document.getElementById('f-key').value,
    field_type: fieldType,
    label: document.getElementById('f-label').value,
    placeholder: document.getElementById('f-placeholder').value,
    default_value: document.getElementById('f-default').value,
    required: parseInt(document.getElementById('f-required').value),
    rows: parseInt(document.getElementById('f-rows').value),
    sort_order: parseInt(document.getElementById('f-sort').value),
    options: [],
    max_count: 0,
    is_group: fieldType === 'select_group' ? 1 : 0,
    group_config: {},
  };
  if (fieldType === 'select' || fieldType === 'select_group') data.options = collectFieldOptions();
  if (fieldType === 'select_group') {
    const raw = document.getElementById('f-group-config').value.trim();
    try {
      data.group_config = raw ? JSON.parse(raw) : {};
    } catch (err) {
      alert('分组选项 JSON 格式不正确，请检查逗号、引号和括号。');
      return;
    }
  }
  if (fieldType==='file_image') {
    data.max_count = parseInt(document.getElementById('f-maxcount').value || '1');
    data.multiple = data.max_count > 1;
  }
  if (id) await api(`/admin/api/fields/${id}`, 'PUT', data);
  else await api(`/admin/api/models/${selectedModelId}/fields`, 'POST', data);
  renderFields();
}

async function delField(id) {

  await api(`/admin/api/fields/${id}`, 'DELETE');
  renderFields();
}

        <div><label>状态</label><select id="pr-active"><option value="1" ${p.is_active !== 0 ? 'selected' : ''}>启用</option><option value="0" ${p.is_active === 0 ? 'selected' : ''}>停用</option></select></div>
      </div>
      <div class="actions">
        <button class="btn btn-edit" onclick="renderPricing()">取消</button>
        <button class="btn btn-primary" onclick="savePricing()">💾 保存计价</button>
      </div>
    </div>`;
}

async function savePricing() {
  const modelId = document.getElementById('pr-model').value;
  const model = models.find(m => m.id === modelId);
  const data = {
    model_id: modelId,
    model_name: document.getElementById('pr-name').value || model?.name || modelId,
    billing_mode: document.getElementById('pr-mode').value,
    unit_name: document.getElementById('pr-unit-name').value,
    credits_1k: parseInt(document.getElementById('pr-1k').value),
    credits_2k: parseInt(document.getElementById('pr-2k').value),
    credits_4k: parseInt(document.getElementById('pr-4k').value),
    unit_field: document.getElementById('pr-unit-field').value,
    unit_credits: parseFloat(document.getElementById('pr-unit-credits').value || '0'),
    min_credits: parseInt(document.getElementById('pr-min').value || '0'),
    cost_per_unit: parseFloat(document.getElementById('pr-cost').value || '0'),
    retail_markup: parseFloat(document.getElementById('pr-markup').value || '1'),
    is_active: parseInt(document.getElementById('pr-active').value),
  };
  await api('/admin/api/pricing', 'POST', data);
  renderPricing();
}

// ===== Balance Ledger =====
async function renderLedger() {
  ledgerEntries = await api('/admin/api/ledger?limit=100');
  const h = [
    `<div class="page-title">📒 余额流水</div>`,
    `<div class="page-desc">用于追踪充值、生成扣费、失败退款、代理费用和人工调整。余额字段只是快照，流水才是财务依据。</div>`,
    `<div class="notice">💡 商业化运营时，客服处理“为什么扣费/为什么退款”应优先查看这里；同一个幂等键只会入账一次。</div>`,
    `<div class="card">
      <div class="card-header">
        <div class="card-title"><span class="icon">📒</span> 最近流水 (${ledgerEntries.length})</div>
        <button class="btn btn-edit btn-sm" onclick="renderLedger()">刷新</button>
      </div>`
  ];
  if (!ledgerEntries.length) {
    h.push('<div class="empty"><div class="empty-icon">📒</div>暂无余额流水</div>');
  } else {
    h.push('<table><tr><th>时间</th><th>用户</th><th>类型</th><th>变动</th><th>余额</th><th>关联</th><th>幂等键</th><th>备注</th></tr>');
    for (const row of ledgerEntries) {
      const delta = Number(row.delta || 0);
      h.push(`<tr>
        <td>${esc(row.created_at || '')}</td>
        <td>#${row.user_id}</td>
        <td><span class="tag tag-blue">${esc(row.entry_type || '')}</span></td>
        <td><strong style="color:${delta >= 0 ? 'var(--green)' : 'var(--red)'}">${delta >= 0 ? '+' : ''}${delta}</strong></td>
        <td>${row.balance_before} → ${row.balance_after}</td>
        <td>${esc(row.reference_type || '—')} ${row.reference_id ? '#' + esc(row.reference_id) : ''}</td>
        <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis"><code>${esc(row.idempotency_key || '—')}</code></td>
        <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis">${esc(row.note || '')}</td>
      </tr>`);
    }
    h.push('</table>');
  }
  h.push('</div>');
  document.getElementById('main-content').innerHTML = h.join('');
}

    smtp_use_ssl: document.getElementById('stp_ssl').value,
    oauth_redirect_base: document.getElementById('oa_redirect_base').value,
    oauth_google_enabled: document.getElementById('oa_google_enabled').value,
    oauth_google_client_id: document.getElementById('oa_google_id').value,
    oauth_google_secret: document.getElementById('oa_google_secret').value,
    oauth_github_enabled: document.getElementById('oa_github_enabled').value,
    oauth_github_client_id: document.getElementById('oa_github_id').value,
    oauth_github_secret: document.getElementById('oa_github_secret').value,

    recharge_30: document.getElementById('r_30').value,
    recharge_50: document.getElementById('r_50').value,
    recharge_100: document.getElementById('r_100').value,
    recharge_300: document.getElementById('r_300').value,
    recharge_500: document.getElementById('r_500').value,
  };
  const result = await api('/admin/api/settings', 'POST', data);
  const status = document.getElementById('smtp_status');
  if (result.smtp_test) status.textContent = result.smtp_test;
  else status.textContent = '✅ 设置已保存';
}

async function syncTikpanNodes() {
  if (!confirm('会把 catalog 中的 Tikpan 节点同步为网站模型，并刷新这些模型的字段。继续吗？')) return;
  const result = await api('/admin/api/sync-tikpan-nodes', 'POST', {});
  alert(`同步完成：${result.summary.models} 个模型，${result.summary.fields} 个字段。`);
  renderModels();
}
