services:
  tikpan-web:
    build: .
    container_name: tikpan-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/api/models"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
